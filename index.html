<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: #26241F;
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    display: flex; justify-content: center;
    overscroll-behavior: none;
  }
  #root {
    position: relative;
    width: 100%; max-width: 440px;
    height: 100dvh; min-height: 100dvh;
    overflow: hidden;
    background: #1C2B4A;
    box-shadow: 0 0 60px rgba(0,0,0,.4);
  }
  /* hide scrollbars but keep scrolling */
  .screen-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .screen-scroll { scrollbar-width: none; }
  button { font-family: inherit; }

  @keyframes slideFwd { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes slideBack { from { transform: translateX(-24%); opacity: .6; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
</style>
</head>
<body style="background-color: rgb(38, 36, 31)">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
